name: Achievement Farm

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  farm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Farm PR
        run: |
          mkdir -p .farming
          BRANCH="farm/achievement-$(date +%s)"
          git checkout -b $BRANCH

          date >> .farming/log.txt

          git config user.name "achievement-farmer"
          git config user.email "farmer@example.com"
          git add .
          git commit -m "chore: farm run $(date)"
          git push origin $BRANCH

          PR_URL=$(gh pr create \
            --base main \
            --head $BRANCH \
            --title "chore: achievement farm $(date)" \
            --body "Automated farming run")

          gh pr merge "$PR_URL" --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
