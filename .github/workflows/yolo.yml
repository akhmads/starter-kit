name: YOLO Merge

on:
  pull_request:
    types: [labeled]

jobs:
  yolo-merge:
    if: contains(github.event.pull_request.labels.*.name, 'yolo')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: YOLO merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
